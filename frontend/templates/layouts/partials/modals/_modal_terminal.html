<!-- Floating Terminal (VS Code style) -->
<div class="floating-terminal" id="floating-terminal" role="region" aria-label="Terminal flotante" style="display: none;">
    <div class="floating-terminal-header" id="floating-terminal-header">
        <div class="floating-terminal-title">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <path d="M2 3L14 3L14 13L2 13L2 3Z"/>
                <polyline points="5 6 8 9 5 12"/>
            </svg>
            Terminal
        </div>
        <div class="floating-terminal-actions">
            <button class="btn-icon" id="terminal-minimize" aria-label="Minimizar terminal" title="Minimize">&#x2012;</button>
            <button class="btn-icon" id="terminal-maximize" aria-label="Maximizar terminal" title="Maximize">&#x25A1;</button>
            <button class="btn-icon" id="terminal-close" aria-label="Cerrar terminal" title="Close">&times;</button>
        </div>
    </div>
    <div id="floating-terminal-body">
        <div id="terminal-container" style="width: 100%; height: 100%; background: #000; color: #fff;"></div>
    </div>
</div>
