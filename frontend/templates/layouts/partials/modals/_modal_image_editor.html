<!-- Image Editor Modal -->
<div class="modal" id="image-editor-modal" role="dialog" aria-modal="true" aria-labelledby="image-editor-modal-title" style="display: none;">
    <div class="modal-content modal-wide">
        <div class="modal-header">
            <h2 id="image-editor-modal-title">Image Asset Editor</h2>
            <button class="close-modal" aria-label="Close" data-modal-close>&times;</button>
        </div>
        <div id="image-editor-container">
            <canvas id="image-canvas"></canvas>
        </div>
        <div class="form-actions">
            <button class="btn-primary" id="save-asset-btn">Save Asset</button>
            <button class="btn-secondary" id="img2img-variation-btn">Request Variation (img2img)</button>
        </div>
    </div>
</div>
