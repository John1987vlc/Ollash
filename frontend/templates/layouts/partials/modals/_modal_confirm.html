<!-- Confirmation Dialog Modal (generic, for destructive actions) -->
<div class="modal" id="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title" style="display: none;">
    <div class="modal-content" style="max-width: 420px;">
        <div class="modal-header">
            <h2 id="confirm-modal-title">Confirmar Acción</h2>
            <button class="close-modal" aria-label="Close" data-modal-close>&times;</button>
        </div>
        <div style="padding: var(--spacing-lg);">
            <p id="confirm-modal-message">¿Estás seguro?</p>
        </div>
        <div class="form-actions">
            <button class="btn-secondary" id="confirm-modal-cancel" data-modal-close>Cancelar</button>
            <button class="btn-primary" id="confirm-modal-ok">Confirmar</button>
        </div>
    </div>
</div>
