        <div class="health-metric-mini">
            <span class="health-label">CPU</span>
            <span class="health-value" id="health-cpu-val">--%</span>
        </div>
        <div class="health-metric-mini">
            <span class="health-label">RAM</span>

            <span class="health-label">DSK</span>
