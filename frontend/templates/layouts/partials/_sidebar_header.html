<!-- Sidebar Header: Logo + Collapse Toggle -->
<div class="sidebar-header sidebar-header-row">
    <button class="logo" id="sidebar-logo-btn" aria-label="Toggle navigation" title="Toggle sidebar" style="background:none;border:none;cursor:pointer;text-decoration:none;padding:0;">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false" style="flex-shrink:0;">
            <rect width="32" height="32" rx="8" fill="url(#logo-gradient)"/>
            <path d="M16 8L22 12V20L16 24L10 20V12L16 8Z" stroke="white" stroke-width="2" fill="none"/>
            <circle cx="16" cy="16" r="3" fill="white"/>
            <defs>
                <linearGradient id="logo-gradient" x1="0" y1="0" x2="32" y2="32">
                    <stop offset="0%" stop-color="#6366f1"/>
                    <stop offset="100%" stop-color="#8b5cf6"/>
                </linearGradient>
            </defs>
        </svg>
        <span>Ollash</span>
    </button>
    <button class="sidebar-collapse-btn" id="sidebar-collapse-toggle" aria-label="Collapse navigation" title="Collapse sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
</div>
