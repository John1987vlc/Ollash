<!-- Sidebar Header: Logo + Theme + Pair Programming toggle -->
<div class="sidebar-header">
    <div class="logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-hidden="true" focusable="false">
            <rect width="32" height="32" rx="8" fill="url(#logo-gradient)"/>
            <path d="M16 8L22 12V20L16 24L10 20V12L16 8Z" stroke="white" stroke-width="2" fill="none"/>
            <circle cx="16" cy="16" r="3" fill="white"/>
            <defs>
                <linearGradient id="logo-gradient" x1="0" y1="0" x2="32" y2="32">
                    <stop offset="0%" stop-color="#6366f1"/>
                    <stop offset="100%" stop-color="#8b5cf6"/>
                </linearGradient>
            </defs>
        </svg>
        <span>Ollash</span>
    </div>

    <div class="header-actions">
        <button class="theme-toggle-minimal" id="theme-toggle" data-theme-toggle
                aria-label="Switch theme" aria-pressed="false">
            <span id="theme-icon">☀️</span>
        </button>
        
        <button class="btn-icon" id="toggle-pair-mode" title="Toggle Pair Programming Mode" aria-label="Toggle Pair Programming Mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        </button>
    </div>
</div>
