<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ollash - Local IT Agent{% endblock %}</title>
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout/grid.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/nav.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/modals.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/notifications.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations/loaders.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations/transitions.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/artifact-renderer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/artifact-markdown.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/artifact-tasks.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/swarm.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/create-project.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/knowledge-graph.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/image-editor.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Apply persisted theme immediately to prevent flash of wrong theme -->
    <script>
        (function() {
            var t = localStorage.getItem('ollash-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        }());
    </script>

    <!-- Global Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <!-- Monaco Editor -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.29.1/min/vs/editor/editor.main.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.29.1/min/vs/loader.min.js"></script>
    
    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    
    <!-- Mermaid.js -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true, theme: 'dark' });</script>
    
    <!-- Xterm.js assets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/4.16.0/xterm.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/4.16.0/xterm.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm-addon-fit/0.5.0/xterm-addon-fit.min.js"></script>
    
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Command Palette CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/command-palette.css') }}">

    {% block styles %}{% endblock %}
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <!-- Mobile hamburger menu button -->
    <button class="sidebar-hamburger" id="sidebar-hamburger" aria-label="Abrir menú de navegación" aria-expanded="false" aria-controls="main-sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </button>

    <div class="app-container">
        {% include 'layouts/partials/sidebar.html' %}

        <!-- Main Content -->
        <main class="main-content">
            <!-- New Modern Header -->
            <header class="view-top-bar">
                <div class="view-title-area">
                    <h2 id="current-view-title">Dashboard</h2>
                </div>
                <div class="view-actions-area">
                    <button class="btn-secondary theme-toggle-btn" id="theme-toggle" data-theme-toggle title="Cambiar tema">
                        <span id="theme-icon">☀️</span>
                        <span class="theme-label-text">Tema</span>
                    </button>
                </div>
            </header>

            <!-- Global View Loader -->
            <div id="global-page-loader" class="view-loader-overlay" style="display: none;">
                <div class="loader-content">
                    <div class="spinner-large"></div>
                    <p>Cargando sección...</p>
                </div>
            </div>
            
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global Modals & Components -->
    {% include 'layouts/partials/modals.html' %}

    <!-- Command Palette Overlay -->
    <div id="command-palette-overlay" class="command-palette-overlay" role="dialog" aria-modal="true" aria-label="Paleta de comandos">
        <div class="command-palette">
            <div class="command-palette-input-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="command-palette-input" placeholder="Search for views, tools, or settings..." autocomplete="off"
                    role="combobox" aria-expanded="true" aria-autocomplete="list" aria-controls="command-palette-results" aria-label="Buscar en paleta de comandos">
            </div>
            <div id="command-palette-results" class="command-palette-results">
                <!-- Dynamic results -->
            </div>
            <div class="command-palette-footer">
                <div class="command-shortcut"><kbd>↑↓</kbd> to navigate</div>
                <div class="command-shortcut"><kbd>↵</kbd> to select</div>
                <div class="command-shortcut"><kbd>ESC</kbd> to close</div>
            </div>
        </div>
    </div>

    <!-- Global Core Scripts -->
    <!-- Foundation: module-registry, store and theme-manager must load before all other modules -->
    <script src="{{ url_for('static', filename='js/core/module-registry.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/store.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/theme-manager.js') }}"></script>
    <!-- Reusable UI components -->
    <script src="{{ url_for('static', filename='js/components/modal-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/confirm-dialog.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/notification-toast.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/ui-animations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/sse-connection-manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/alert-handler.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/benchmark-service.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/notification-service.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/chat-module.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/artifact-renderer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/structure-editor.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/notifications.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/health.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/terminal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/command-palette.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/benchmark-modal.js') }}"></script>
    
    <!-- Main Orchestrator -->
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
