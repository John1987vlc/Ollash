{% block styles %}
<style>
    .security-layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 20px;
    }
    .security-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 20px;
    }
    .security-status {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
    }
    .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
    }
    .status-secure { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .status-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

    .scan-results {
        margin-top: 20px;
        max-height: 500px;
        overflow-y: auto;
    }
    .vulnerability-item {
        background: var(--color-surface-elevated);
        border-left: 4px solid var(--color-error);
        padding: 12px;
        margin-bottom: 10px;
        border-radius: var(--radius-sm);
    }
</style>
{% endblock %}

<div class="view" id="security-view">
    <div class="view-header">
        <h1>Cybersecurity Control</h1>
        <p class="subtitle">Vulnerability scanning, port analysis, and hardening recommendations.</p>
    </div>

    <div class="security-layout">
        <aside class="security-sidebar">
            <div class="security-card">
                <h3>Quick Scans</h3>
                <div class="form-group" style="margin-top: 15px;">
                    <button class="btn btn-primary" id="btn-vuln-scan" style="width: 100%; margin-bottom: 10px;">Vulnerability Scan</button>
                    <button class="btn btn-secondary" id="btn-port-scan" style="width: 100%; margin-bottom: 10px;">Port Scan</button>
                    <button class="btn btn-secondary" id="btn-integrity-check" style="width: 100%;">Integrity Check</button>
                </div>

                <hr style="margin: 20px 0; opacity: 0.1;">

                <h3>System Hardening</h3>
                <div id="hardening-status" class="security-status">
                    <span class="status-badge status-warning">Action Required</span>
                </div>
                <button class="btn btn-ghost" id="btn-get-recommendations">View Recommendations</button>
            </div>
        </aside>

        <main class="security-main">
            <div class="security-card" style="height: 100%;">
                <div class="section-header">
                    <h3>Scan Results</h3>
                    <button class="btn btn-secondary" id="btn-clear-security-logs">Clear</button>
                </div>

                <div id="security-results-container" class="scan-results">
                    <div class="empty-state">
                        <p>No active scans. Start a scan to see results.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/security.js') }}"></script>
{% endblock %}
