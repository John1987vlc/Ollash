{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/chat.css') }}">
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/voice-commands.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/chat.js') }}"></script>
{% endblock %}

            <!-- Chat View -->
            <div class="view active" id="chat-view">
                <div class="chat-main-layout">
                    <div class="chat-container">
                        <div class="chat-messages" id="chat-messages">
                            <div class="chat-welcome">
                                <h2>Ollash Agent</h2>
                                <p>Select a specialist or start typing to use the auto-routing orchestrator.</p>
                                <div class="agent-cards">
                                    <button class="agent-card active" data-agent="orchestrator">
                                        <div class="agent-card-icon">&#x1f3af;</div>
                                        <div class="agent-card-title">Orchestrator</div>
                                    </button>
                                    <button class="agent-card" data-agent="code">
                                        <div class="agent-card-icon">&#x1f4bb;</div>
                                        <div class="agent-card-title">Code</div>
                                    </button>
                                    <button class="agent-card" data-agent="network">
                                        <div class="agent-card-icon">&#x1f310;</div>
                                        <div class="agent-card-title">Network</div>
                                    </button>
                                    <button class="agent-card" data-agent="system">
                                        <div class="agent-card-icon">&#x2699;&#xfe0f;</div>
                                        <div class="agent-card-title">System</div>
                                    </button>
                                    <button class="agent-card" data-agent="cybersecurity">
                                        <div class="agent-card-icon">&#x1f6e1;&#xfe0f;</div>
                                        <div class="agent-card-title">Security</div>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Redesigned Input Area -->
                        <div class="chat-input-area">
                            <div id="chat-attachment-preview" class="chat-attachment-preview" style="display: none;"></div>
                            
                            <div class="chat-input-wrapper">
                                <textarea id="chat-input" placeholder="Ask Ollash anything..." rows="1"></textarea>
                                <button id="send-btn" class="btn-send" title="Send">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>

                            <div class="chat-input-actions-bar">
                                <div class="action-group">
                                    <button class="btn-action" id="attach-file-btn" title="Attach File">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                                        </svg>
                                        <span>Clip</span>
                                    </button>
                                    <input type="file" id="chat-file-input" style="display: none;" accept="image/*,application/pdf">
                                    
                                    <button class="btn-action" id="generate-assets-btn" title="Generate Image">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                            <polyline points="21 15 16 10 5 21"></polyline>
                                        </svg>
                                        <span>Image</span>
                                    </button>

                                    <button class="btn-action" id="voice-input-btn" title="Voice Input">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                        </svg>
                                        <span>Voice</span>
                                    </button>

                                    <button class="btn-action" id="toggle-prompt-library" title="Prompt Library">
                                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                                            <path d="M3 4H17M3 8H17M3 12H13M3 16H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        </svg>
                                        <span>Prompts</span>
                                    </button>
                                </div>
                                <div class="action-group">
                                    <button class="btn-action-text" id="clear-chat-btn">Clear Thread</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Panel: Tools + History -->
                    <div class="chat-right-panel">
                        <div class="chat-toolbox">
                            <div class="toolbox-header">
                                <h3>Active Tools</h3>
                                <span class="toolbox-badge" id="toolbox-total-count">0</span>
                            </div>
                            <div class="toolbox-search">
                                <input type="text" id="toolbox-search-input" placeholder="Search tools...">
                            </div>
                            <div class="toolbox-content" id="toolbox-content">
                                <div class="toolbox-loading">Loading tools...</div>
                            </div>
                        </div>

                        <div class="chat-history-panel">
                            <div class="history-header">
                                <h3>Past Conversations</h3>
                                <button class="btn-icon-mini" id="refresh-history-btn" title="Refresh History">🔄</button>
                            </div>
                            <div class="history-list" id="chat-history-list">
                                <div class="history-empty">No past sessions found.</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Prompt Library Modal Overlay -->
                <div id="prompt-library-modal" class="modal" role="dialog" aria-modal="true" style="display: none;">
                    <div class="modal-content modal-wide">
                        <div class="modal-header">
                            <h3>Prompt Library</h3>
                            <button class="close-modal" id="close-prompts-btn">&times;</button>
                        </div>
                        <div class="prompt-library-body">
                            <div class="prompt-search-bar">
                                <input type="text" id="prompt-search-input" placeholder="Search prompts..." class="form-input">
                            </div>
                            <div class="prompt-library-categories">
                                <button class="prompt-cat-btn active" data-cat="all">All</button>
                                <button class="prompt-cat-btn" data-cat="system">System</button>
                                <button class="prompt-cat-btn" data-cat="network">Network</button>
                                <button class="prompt-cat-btn" data-cat="security">Security</button>
                                <button class="prompt-cat-btn" data-cat="code">Code</button>
                            </div>
                            <div class="prompt-library-grid" id="prompt-library-list">
                                <!-- Cards injected via JS -->
                            </div>
                            
                            <div class="custom-prompt-add">
                                <hr>
                                <h4>Add Custom Prompt</h4>
                                <div style="display: flex; gap: 10px; margin-top: 10px;">
                                    <input type="text" id="custom-prompt-label" placeholder="Label (e.g. My Script)" class="form-input">
                                    <input type="text" id="custom-prompt-text" placeholder="The prompt instruction..." class="form-input" style="flex: 2;">
                                    <button class="btn-primary" id="add-custom-prompt-btn">Add to Library</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
