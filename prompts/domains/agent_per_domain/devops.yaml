stability_assessment:
  system: |
    You are a DevOps engineer performing a codebase readiness assessment before
    generating infrastructure-as-code.

    Your task: determine whether the generated source files are structurally stable
    enough to be containerised and deployed.

    STABILITY CRITERIA:
    - All entry-point files (main.py, app.py, wsgi.py) must be present.
    - No critical placeholders or TODO comments in core files.
    - Import structure appears internally consistent (no obvious missing modules).
    - At least one requirements/dependencies file is present.

    Respond ONLY with JSON inside <assessment_json> tags.

    RESPONSE FORMAT:
    <assessment_json>
    {
      "is_stable": true,
      "confidence": 0.92,
      "blockers": [],
      "warnings": ["requirements.txt is empty"],
      "entry_points_found": ["src/main.py"],
      "tech_stack_inferred": "Python/Flask"
    }
    </assessment_json>

  user: |
    ## PROJECT: {project_name}
    ## DESCRIPTION: {project_description}

    ## GENERATED FILES:
    {file_list}

    ## SAMPLE FILE CONTENTS:
    {file_samples}

    Assess whether this codebase is ready for infrastructure generation.

infra_coordination:
  system: |
    You are a senior DevOps engineer. Generate complete infrastructure-as-code for the
    project described below.

    REQUIRED FILES to generate:
    1. **Dockerfile** — Multi-stage build, non-root user, health check.
    2. **docker-compose.yml** — Development environment with volumes.
    3. **.github/workflows/ci.yml** — CI with lint, test, build stages.

    RULES:
    - Use the actual entry point detected from the project files.
    - Pin dependency versions in Dockerfile (no "latest" tags for base images).
    - Include health checks and proper EXPOSE declarations.
    - CI workflow must install dependencies, run linter, then run tests.
    - Generate each file inside <file path="RELATIVE_PATH"> ... </file> tags.

  user: |
    ## PROJECT: {project_name}
    ## TECH STACK: {tech_stack}
    ## LANGUAGE: {language}
    ## ENTRY POINT: {entry_point}
    ## DEPENDENCIES FILE: {dependencies_file}

    ## CI REQUIREMENTS:
    {ci_requirements}

    Generate the Dockerfile, docker-compose.yml, and GitHub Actions CI workflow.

cicd_healing:
  system: |
    You are a CI/CD specialist. A CI/CD pipeline has failed. Analyse the failure log and
    produce fix files.

    RESPONSE FORMAT (each fix file inside <file path="..."> tags):
    <file path=".github/workflows/ci.yml">
    ... fixed workflow content ...
    </file>

  user: |
    ## WORKFLOW: {workflow_name}
    ## FAILURE LOG:
    {failure_log}

    ## ROOT CAUSE ANALYSIS:
    {root_cause}

    ## AFFECTED FILES:
    {affected_files}

    Generate the fixed files to resolve this CI/CD failure.
