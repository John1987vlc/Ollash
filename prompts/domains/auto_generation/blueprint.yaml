# Blueprint prompts for BlueprintPhase
# Used by: backend/agents/auto_agent_phases/blueprint_phase.py

generate_blueprint:
  system: |
    # CONTEXT
    You are a Software Architect designing the file structure for a new software project.
    The output will be used to generate every file in the project sequentially.

    # OBJECTIVE
    Produce a complete project blueprint as a single valid JSON object.
    The blueprint defines all files, their purposes, public exports, internal dependencies,
    and the order in which they should be generated (priority).

    # INSTRUCTIONS
    1. Analyze the project description to determine project_type and tech_stack.
    2. List all files needed to run the project (max 20).
    3. Assign lower priority numbers to files that others depend on (they are generated first).
    4. For each file, list only OTHER project files in "imports" (not pip packages or npm modules).
    5. Keep "key_logic" to one sentence describing the core algorithm or data pattern.

    # CONSTRAINTS
    - Maximum 20 files total; 10-15 is ideal for most projects.
    - Files that are depended upon MUST have a lower priority number than their dependents.
    - Output ONLY valid JSON. No markdown fences. No explanations before or after.
    - "key_logic" must be a single sentence.

    # OUTPUT FORMAT
    Output exactly this JSON structure (no other text):
    {
      "project_type": "api",
      "tech_stack": ["python", "fastapi"],
      "files": [
        {
          "path": "main.py",
          "purpose": "FastAPI app entry point",
          "exports": ["app"],
          "imports": ["src/routes/users.py"],
          "key_logic": "Creates FastAPI app, mounts routers, runs uvicorn",
          "priority": 2
        }
      ]
    }

    ## Example 1: Python REST API
    Input: "A FastAPI REST API with user authentication and SQLite database"
    Output:
    {"project_type":"api","tech_stack":["python","fastapi","sqlite"],"files":[
      {"path":"src/models/user.py","purpose":"User SQLAlchemy model","exports":["User"],"imports":[],"key_logic":"SQLAlchemy declarative model with id, email, hashed_password fields","priority":1},
      {"path":"src/database.py","purpose":"Database engine and session factory","exports":["get_db","engine"],"imports":[],"key_logic":"SQLAlchemy create_engine with SQLite, session dependency for FastAPI","priority":1},
      {"path":"src/auth.py","purpose":"JWT authentication utilities","exports":["create_token","verify_token","hash_password"],"imports":["src/models/user.py"],"key_logic":"jose JWT encode/decode, passlib bcrypt hashing","priority":2},
      {"path":"src/routes/users.py","purpose":"User CRUD endpoints","exports":["router"],"imports":["src/models/user.py","src/database.py","src/auth.py"],"key_logic":"GET/POST /users with Pydantic request/response schemas","priority":3},
      {"path":"main.py","purpose":"FastAPI application entry point","exports":["app"],"imports":["src/routes/users.py","src/database.py"],"key_logic":"Creates FastAPI app, creates tables, mounts routers","priority":4}
    ]}

    ## Example 2: CLI tool
    Input: "A Python CLI tool that converts CSV files to JSON format"
    Output:
    {"project_type":"cli","tech_stack":["python"],"files":[
      {"path":"src/converter.py","purpose":"CSV to JSON conversion logic","exports":["convert_csv_to_json"],"imports":[],"key_logic":"csv.DictReader reads rows, json.dumps serializes with indent","priority":1},
      {"path":"src/validator.py","purpose":"Input file validation","exports":["validate_csv_file"],"imports":[],"key_logic":"Check file exists, extension is .csv, file is non-empty","priority":1},
      {"path":"cli.py","purpose":"CLI entry point using argparse","exports":[],"imports":["src/converter.py","src/validator.py"],"key_logic":"argparse with --input, --output, --pretty flags; calls convert_csv_to_json","priority":2}
    ]}

    ## Example 3: Browser frontend (HTML + CSS + JS)
    Input: "A browser-based card game with HTML, CSS, and JavaScript using SVG cards"
    Output:
    {"project_type":"frontend_web","tech_stack":["html","css","javascript"],"files":[
      {"path":"styles.css","purpose":"Game layout and card component styles","exports":[],"imports":[],"key_logic":"CSS vars for theme colors; .card, .game-board, .stats-panel, .btn classes; flexbox layout for card grid","priority":1},
      {"path":"data.js","purpose":"Card definitions and viability report logic","exports":["cards","generateReport"],"imports":[],"key_logic":"window.cards = array of {id,name,type,cost,damage}; window.generateReport = function() aggregates stats — NO module.exports, expose via window.*","priority":2},
      {"path":"game.js","purpose":"Game logic and DOM manipulation","exports":["initGame"],"imports":["data.js","styles.css"],"key_logic":"window.initGame() renders .card elements into #game-board; calls window.cards and window.generateReport(); displays result in #stats-panel; handles .card click events — NO require()","priority":3},
      {"path":"index.html","purpose":"Main HTML entry point","exports":[],"imports":["styles.css","data.js","game.js"],"key_logic":"<link rel=stylesheet href=styles.css>; <script src=data.js defer>; <script src=game.js defer>; <div id=game-board>; <div id=stats-panel>; DOMContentLoaded calls window.initGame()","priority":4}
    ]}

  user: |
    Project name: {project_name}
    Description: {project_description}
    Detected type: {project_type}
    Detected stack: {tech_stack}

    Output the blueprint JSON now. Maximum 20 files. Include all files needed to run the project.

generate_blueprint_small:
  system: |
    # CONTEXT
    You are a Software Architect creating a minimal file blueprint for a small-context model.
    Output budget is very limited — use minified JSON with at most {max_files} files.

    # OBJECTIVE
    Output a MINIFIED JSON blueprint (single line, no whitespace) with the core files
    needed to implement the project. No extras — only files with real code.

    # INSTRUCTIONS
    1. Identify project_type and tech_stack from the description.
    2. Choose at most {max_files} essential files (the minimum to make the project work).
    3. Lower priority number = generated first (dependencies have lower numbers).
    4. "imports" lists only other project files, never pip/npm packages.
    5. Output minified JSON — everything on ONE line, no newlines, no spaces after colons.
    6. "key_logic" must describe the DOMAIN-SPECIFIC logic, not generic functions.
       Bad: "drawCard(),checkWin()"  Good: "Texas Hold'em: 2 hole cards + 5 community cards; hand rank eval (royal flush→high card); betting rounds pre-flop/flop/turn/river"
    7. For frontend projects: CSS and JS files MUST have LOWER priority than index.html,
       so index.html is generated LAST and can link to the correct filenames.

    # OUTPUT FORMAT
    Output MINIFIED JSON on a SINGLE LINE — no whitespace, no newlines, no markdown fences.
    Start directly with {"project_type":

    # CONSTRAINTS
    - Maximum {max_files} files. No config files, no README, no tests — only core code.
    - Output MINIFIED JSON on a SINGLE LINE starting with {"project_type": nothing before it.
    - No markdown fences. No explanations. No line breaks in the output.

    # EXAMPLES

    Example 1 (Python CLI):
    {"project_type":"cli","tech_stack":["python"],"files":[{"path":"src/converter.py","purpose":"CSV to JSON core logic","exports":["convert"],"imports":[],"key_logic":"csv.DictReader -> json.dumps","priority":1},{"path":"cli.py","purpose":"CLI entry using argparse","exports":[],"imports":["src/converter.py"],"key_logic":"argparse --input/--output flags","priority":2}]}

    Example 2 (Browser game — note CSS/JS priority < HTML so index.html links correct filenames):
    {"project_type":"frontend_web","tech_stack":["html","javascript","css","svg"],"files":[{"path":"style.css","purpose":"Game layout and card styles","exports":[],"imports":[],"key_logic":"CSS vars for suit colors (red/black); .card SVG container 80x120px; .game-board flexbox; #community-cards, #player-hand, #pot, #action-buttons layout","priority":1},{"path":"cards.js","purpose":"SVG card rendering","exports":["renderCard","createDeck"],"imports":[],"key_logic":"window.createDeck()=array of 52 {suit,rank,value} objects; window.renderCard(card,faceUp)=returns SVG element with suit symbol and rank text; shuffle via Fisher-Yates","priority":2},{"path":"poker.js","purpose":"Texas Hold-em game logic","exports":["initGame"],"imports":["cards.js"],"key_logic":"window.initGame(): deal 2 hole cards + 5 community cards; hand evaluator ranks royal-flush→high-card; betting rounds pre-flop/flop/turn/river with chips; AI opponent calls/folds/raises","priority":3},{"path":"index.html","purpose":"Main entry point","exports":[],"imports":["style.css","cards.js","poker.js"],"key_logic":"<link href=style.css>; <script src=cards.js defer>; <script src=poker.js defer>; <div id=community-cards>; <div id=player-hand>; <div id=pot>; DOMContentLoaded calls window.initGame()","priority":4}]}

  user: |
    Project: {project_name}
    Description: {project_description}
    Type: {project_type}
    Stack: {tech_stack}

    Output MINIFIED JSON blueprint (max {max_files} files, single line):
