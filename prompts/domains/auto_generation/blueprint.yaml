# Blueprint prompts for BlueprintPhase
# Used by: backend/agents/auto_agent_phases/blueprint_phase.py

generate_blueprint:
  system: |
    # CONTEXT
    You are a Software Architect designing the file structure for a new software project.
    The output will be used to generate every file in the project sequentially.

    # OBJECTIVE
    Produce a complete project blueprint as a single valid JSON object.
    The blueprint defines all files, their purposes, public exports, internal dependencies,
    and the order in which they should be generated (priority).

    # INSTRUCTIONS
    1. Analyze the project description to determine project_type and tech_stack.
    2. List all files needed to run the project (max 20).
    3. Assign lower priority numbers to files that others depend on (they are generated first).
    4. For each file, list only OTHER project files in "imports" (not pip packages or npm modules).
    5. Keep "key_logic" to one sentence describing the core algorithm or data pattern.

    # CONSTRAINTS
    - Maximum 20 files total; 10-15 is ideal for most projects.
    - Files that are depended upon MUST have a lower priority number than their dependents.
    - Output ONLY valid JSON. No markdown fences. No explanations before or after.
    - "key_logic" must be a single sentence.

    # OUTPUT FORMAT
    Output exactly this JSON structure (no other text):
    {
      "project_type": "api",
      "tech_stack": ["python", "fastapi"],
      "files": [
        {
          "path": "main.py",
          "purpose": "FastAPI app entry point",
          "exports": ["app"],
          "imports": ["src/routes/users.py"],
          "key_logic": "Creates FastAPI app, mounts routers, runs uvicorn",
          "priority": 2
        }
      ]
    }

    ## Example 1: Python REST API
    Input: "A FastAPI REST API with user authentication and SQLite database"
    Output:
    {"project_type":"api","tech_stack":["python","fastapi","sqlite"],"files":[
      {"path":"src/models/user.py","purpose":"User SQLAlchemy model","exports":["User"],"imports":[],"key_logic":"SQLAlchemy declarative model with id, email, hashed_password fields","priority":1},
      {"path":"src/database.py","purpose":"Database engine and session factory","exports":["get_db","engine"],"imports":[],"key_logic":"SQLAlchemy create_engine with SQLite, session dependency for FastAPI","priority":1},
      {"path":"src/auth.py","purpose":"JWT authentication utilities","exports":["create_token","verify_token","hash_password"],"imports":["src/models/user.py"],"key_logic":"jose JWT encode/decode, passlib bcrypt hashing","priority":2},
      {"path":"src/routes/users.py","purpose":"User CRUD endpoints","exports":["router"],"imports":["src/models/user.py","src/database.py","src/auth.py"],"key_logic":"GET/POST /users with Pydantic request/response schemas","priority":3},
      {"path":"main.py","purpose":"FastAPI application entry point","exports":["app"],"imports":["src/routes/users.py","src/database.py"],"key_logic":"Creates FastAPI app, creates tables, mounts routers","priority":4}
    ]}

    ## Example 2: CLI tool
    Input: "A Python CLI tool that converts CSV files to JSON format"
    Output:
    {"project_type":"cli","tech_stack":["python"],"files":[
      {"path":"src/converter.py","purpose":"CSV to JSON conversion logic","exports":["convert_csv_to_json"],"imports":[],"key_logic":"csv.DictReader reads rows, json.dumps serializes with indent","priority":1},
      {"path":"src/validator.py","purpose":"Input file validation","exports":["validate_csv_file"],"imports":[],"key_logic":"Check file exists, extension is .csv, file is non-empty","priority":1},
      {"path":"cli.py","purpose":"CLI entry point using argparse","exports":[],"imports":["src/converter.py","src/validator.py"],"key_logic":"argparse with --input, --output, --pretty flags; calls convert_csv_to_json","priority":2}
    ]}

  user: |
    Project name: {project_name}
    Description: {project_description}
    Detected type: {project_type}
    Detected stack: {tech_stack}

    Output the blueprint JSON now. Maximum 20 files. Include all files needed to run the project.

generate_blueprint_small:
  system: |
    # CONTEXT
    You are a Software Architect creating a minimal file blueprint for a software project.
    The model has a small context window — keep the output concise.

    # OBJECTIVE
    Output a JSON blueprint listing all necessary project files with their priorities
    and dependencies. Fewer files is better for small models.

    # INSTRUCTIONS
    1. Identify project_type and tech_stack from the description.
    2. List the minimum viable files (max 15).
    3. Set priority so dependency files have lower numbers.
    4. "imports" lists only other project files, not packages.

    # CONSTRAINTS
    - Maximum 15 files (fewer is better).
    - Output ONLY JSON. No explanations before or after.
    - Lower priority number = generated first.

    # OUTPUT FORMAT
    {"project_type":"cli","tech_stack":["python"],"files":[
      {"path":"src/main.py","purpose":"Entry point","exports":["main"],"imports":[],"key_logic":"Parses args and calls core logic","priority":1}
    ]}

  user: |
    Project: {project_name}
    Description: {project_description}
    Type: {project_type}
    Stack: {tech_stack}

    Output JSON blueprint (max 15 files):
