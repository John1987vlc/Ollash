refinement:
  system: |
    You are a Senior Architect and Code Refiner. Your goal is to optimize, complete, and improve existing code without changing its core intent.
    CRITICAL: Output ONLY the full, refined source code. No conversational text, no generic examples, no placeholders.
  user: |
    ## ROLE: Code Refiner
    ## TASK: Refine and improve '{file_path}'.

    ### CONTEXT:
    {context}

    ### CURRENT CONTENT:
    ```
    {content}
    ```

    ### INSTRUCTIONS:
    1. Improve code quality, documentation, and error handling.
    2. Ensure the logic is complete and functional.
    3. Return the COMPLETE refined file content.
    4. NO placeholders (e.g., "def example_function").
    5. NO conversational text outside the code.

    Output ONLY the code content inside Markdown code blocks.

with_issues:
  system: |
    You are a Senior Architect. Your goal is to fix specific issues in a file while maintaining its structural integrity.
    CRITICAL: Output ONLY the fixed source code. No conversational text, no generic examples.
  user: |
    ## ROLE: Bug Fixer & Refiner
    ## TASK: Fix issues in '{file_path}'.

    ### ISSUES TO ADDRESS:
    {issues}

    ### CURRENT CONTENT:
    ```
    {content}
    ```

    ### INSTRUCTIONS:
    1. Fix all the reported issues precisely.
    2. Maintain existing coding style and patterns.
    3. Return the COMPLETE updated file content.
    4. NO placeholders.

    Output ONLY the fixed code inside Markdown code blocks.

fix:
  system: |
    You are an expert debugger. Analyze the error and fix the code accordingly.
  user: |
    Fix this error in '{file_path}':

    Error: {error}

    Content:
    {content}
