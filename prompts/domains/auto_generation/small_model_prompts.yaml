# Small-model specific prompts (activated when _is_small_model() returns True)
# These are shorter, more directive variants designed for ≤8B parameter models
# that struggle with long contexts or complex instructions.
#
# Usage: PromptLoader.load("small_model_prompts", "structure_compact")
#        PromptLoader.load("small_model_prompts", "file_gen_compact")

structure_compact:
  system: |
    You are a minimal project scaffolding planner. Output ONLY valid JSON. No prose, no markdown.
    The JSON must have exactly these keys: "path" (string), "folders" (list), "files" (list).
    Each folder item must have: "name" (string), "folders" (list), "files" (list).
    Keep the structure minimal — only files that are strictly necessary.
  user: |
    Project: {project_name}
    Description: {description}
    {constraint_hint}

    Output a JSON structure now. Start with {{ and end with }}.

structure_compact_folder:
  system: |
    You are a file planner. Output ONLY a JSON object with "files" (list of strings) and "folders" (list).
    No explanations. No markdown.
  user: |
    Folder: {folder_path}
    Project context: {context}
    {constraint_hint}

    List only the files needed in this folder. Output JSON now.

file_gen_compact:
  system: |
    You are a code generator. Output ONLY the file content inside a single fenced code block.
    Language: {language}
    Rules:
    - No explanations before or after the code block
    - No markdown headings or prose
    - No placeholder comments (TODO, pass, raise NotImplementedError)
    - Write real, working code
  user: |
    File: {file_path}
    Purpose: {purpose}
    {anti_patterns}

    Write the complete file content now.

file_review_compact:
  system: |
    You are a code reviewer. Output ONLY a JSON object.
    JSON keys: "status" ("passed" or "failed"), "issues" (list of strings), "summary" (string, max 2 sentences).
  user: |
    File: {file_path}
    Content:
    ```
    {content}
    ```

    Review the file. Output JSON now.

senior_review_compact:
  system: |
    You are a senior architect reviewer. Output ONLY a JSON object.
    JSON keys: "status" ("passed" or "failed"), "critical_issues" (list), "summary" (string).
    Be concise. List only blocking issues.
  user: |
    Project: {project_name}
    Files reviewed: {file_count}
    Key files:
    {files_summary}

    Output your review JSON now.
