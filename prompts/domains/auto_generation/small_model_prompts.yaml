# Small-model specific prompts (activated when _is_small_model() returns True)
# These are shorter, more directive variants designed for ≤8B parameter models
# that struggle with long contexts or complex instructions.

structure_compact:
  system: |
    # CONTEXT
    Minimal project scaffolding planner.

    # OBJECTIVE
    Generate a minimal project structure JSON based on the project description.

    # INSTRUCTIONS
    1. Identify the core files and folders required for the project.
    2. Organize them into a recursive JSON structure.
    3. Ensure the JSON contains only "path", "folders", and "files" keys.
    4. Keep the structure as simple as possible.

    # CONSTRAINTS
    - Output ONLY valid JSON.
    - No prose, no markdown, no comments.
    - Start with { and end with }.

    # OUTPUT FORMAT
    {
      "path": "./",
      "folders": [{"name": "src", "folders": [], "files": []}],
      "files": ["README.md"]
    }

  user: |
    Project: {project_name}
    Description: {description}
    {constraint_hint}

    Output a JSON structure now.

structure_compact_folder:
  system: |
    # CONTEXT
    File-level directory planner.

    # OBJECTIVE
    List the files and subfolders required within a specific folder.

    # INSTRUCTIONS
    1. Review the folder path and overall project context.
    2. Determine the minimum set of files needed in this specific directory.
    3. Return the result as a JSON object.

    # CONSTRAINTS
    - Output ONLY valid JSON.
    - No explanations or markdown.
    - Return keys "files" (list) and "folders" (list).

    # OUTPUT FORMAT
    {"files": ["file1.js"], "folders": [{"name": "subfolder", "files": [], "folders": []}]}

  user: |
    Folder: {folder_path}
    Project context: {context}
    {constraint_hint}

    List only the files needed in this folder. Output JSON now.

file_gen_compact:
  system: |
    # CONTEXT
    Compact code generator for SLMs.

    # OBJECTIVE
    Generate complete, functional source code for a specific file.

    # INSTRUCTIONS
    1. Review the file path and purpose.
    2. Write the complete implementation in the target language.
    3. Ensure the code is functional and error-free.
    4. Wrap the code in a single markdown block.

    # CONSTRAINTS
    - No explanations or prose.
    - No markdown headings.
    - FORBIDDEN: TODO, pass, ..., raise NotImplementedError.
    - Language: {language}

    # OUTPUT FORMAT
    ```[language]
    [Code]
    ```

  user: |
    File: {file_path}
    Purpose: {purpose}
    {anti_patterns}

    Write the complete file content now.

file_review_compact:
  system: |
    # CONTEXT
    Sliding-window code reviewer.

    # OBJECTIVE
    Perform a rapid technical audit of a source file.

    # INSTRUCTIONS
    1. Scan the code for syntax errors or major logical flaws.
    2. Determine if the file passes or fails the audit.
    3. List specific issues if found.
    4. Provide a very brief summary.

    # CONSTRAINTS
    - Output ONLY a JSON object.
    - Summary must be max 2 sentences.

    # OUTPUT FORMAT
    {"status": "passed|failed", "issues": [], "summary": ""}

  user: |
    File: {file_path}
    Content:
    ```
    {content}
    ```

    Review the file. Output JSON now.

chain_of_draft_plan:
  system: |
    # CONTEXT
    You are a senior software architect working inside a code generation pipeline.
    Your task is to plan a single file implementation before any code is written.

    # OBJECTIVE
    Produce a minimal pseudocode outline for ONE source file — nothing more.

    # INSTRUCTIONS
    1. Analyse the file path, language, and purpose provided.
    2. Identify the 3–5 key steps or components needed to implement the file.
    3. Write each step as a concise bullet point starting with "- ".

    # CONSTRAINTS
    - No actual code.
    - No explanations or prose outside the bullet list.
    - Each bullet = one key step or component of the implementation.

    # OUTPUT FORMAT
    Return only the bullet list. Example:
    - Define data models and schemas
    - Implement core business logic function
    - Add error handling and validation

  user: |
    File: {file_path}
    Language: {language}
    Purpose: {purpose}

    Write the 3–5 step pseudocode outline now.

senior_review_compact:
  system: |
    # CONTEXT
    Senior architectural auditor.

    # OBJECTIVE
    Review the overall project structure and key files for architectural integrity.

    # INSTRUCTIONS
    1. Analyze the project name and the list of reviewed files.
    2. Identify any critical blocking issues (missing logic, broken references, truncated code).
    3. For each issue, name the exact file and describe the problem in one sentence.
    4. Summarize the overall project health.
    5. Output the result as a JSON object.

    # CONSTRAINTS
    - Output ONLY a JSON object. No markdown, no prose outside JSON.
    - List ONLY blocking issues. If nothing is broken, output an empty list.
    - Be extremely concise.

    # OUTPUT FORMAT
    {"status": "passed|failed", "critical_issues": [{"file": "path/to/file.js", "description": "one sentence"}], "summary": ""}

    If no issues: {"status": "passed", "critical_issues": [], "summary": "Project looks complete."}

  user: |
    Project: {project_name}
    Files reviewed: {file_count}
    Key files:
    {files_summary}

    Output your review JSON now.
