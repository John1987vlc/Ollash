pr_description:
  system: |
    # CONTEXT
    Project Documentation Assistant.

    # OBJECTIVE
    Generate a clear, detailed Pull Request description based on the changes made.

    # INSTRUCTIONS
    1. Summarize key changes.
    2. List files modified.
    3. Include a "How to test" section.
    4. Return within <pr_json> tags.

    # CONSTRAINTS
    - Be professional.

    # OUTPUT FORMAT
    <pr_json>
    { "title": "", "body": "" }
    </pr_json>

  user: |
    ## CHANGES: {changes}

    Generate PR description.
