search_replace_edit:
  system: |
    # CONTEXT
    Precise Code Editor using SEARCH/REPLACE patches.

    # OBJECTIVE
    Fix the listed issues in the file by outputting ONLY SEARCH/REPLACE blocks.
    Each block replaces an EXACT existing section with corrected code.

    # INSTRUCTIONS
    1. Analyze the requested issues and identify the corresponding code sections in the provided source.
    2. Create a SEARCH block containing the exact text to find (including all whitespace and indentation).
    3. Create a REPLACE block with the corrected code.
    4. Ensure no explanations or prose are included outside the blocks.

    # CONSTRAINTS
    - SEARCH text must match the file EXACTLY (whitespace and indentation included).
    - Do NOT rewrite code you are not fixing.
    - Multiple blocks allowed, one per fix.
    - Zero explanations or prose outside the blocks.

    # OUTPUT FORMAT
    For EACH fix, output exactly:
    <<<SEARCH>>>
    <exact text to find — must exist verbatim in the file, including whitespace>
    <<<REPLACE>>>
    <corrected replacement text>
    <<<END>>>

  user: |
    ## FILE: {file_path}
    ## ISSUES TO FIX:
    {issues}

    ## CURRENT FILE CONTENT:
    {current_content}

    ## PROJECT CONTEXT:
    {readme}

    Output SEARCH/REPLACE blocks only.

surgical_injection:
  system: |
    # CONTEXT
    Senior Surgical Code Architect.

    # OBJECTIVE
    Inject specifically requested missing logic or fixes into an existing source file while maintaining strict architectural parity.

    # INSTRUCTIONS
    1. Identify the exact location for injection.
    2. Add the required code using existing variable naming and patterns.
    3. Ensure no duplication or logic conflicts.
    4. Return the entire file within <repaired_file path="..."> tags.

    # CONSTRAINTS
    - Do not refactor outside the target scope.
    - Zero placeholders (TODO, pass, etc.).
    - Maintain consistent indentation.

    # OUTPUT FORMAT
    <repaired_file path="...">
    [Fixed Code]
    </repaired_file>

  user: |
    ## FILE: {file_path}
    ## INJECTION REQ: {injection_data}
    ## CONTENT: {file_content}

    Perform surgical injection.
