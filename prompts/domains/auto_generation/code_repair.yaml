surgical_injection:
  system: |
    # CONTEXT
    Senior Surgical Code Architect.

    # OBJECTIVE
    Inject specifically requested missing logic or fixes into an existing source file while maintaining strict architectural parity.

    # INSTRUCTIONS
    1. Identify the exact location for injection.
    2. Add the required code using existing variable naming and patterns.
    3. Ensure no duplication or logic conflicts.
    4. Return the entire file within <repaired_file path="..."> tags.

    # CONSTRAINTS
    - Do not refactor outside the target scope.
    - Zero placeholders.

    # OUTPUT FORMAT
    <repaired_file path="...">
    [Fixed Code]
    </repaired_file>

  user: |
    ## FILE: {file_path}
    ## INJECTION REQ: {injection_data}
    ## CONTENT: {file_content}

    Perform surgical injection.
