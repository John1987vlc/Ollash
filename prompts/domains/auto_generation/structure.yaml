high_level:
  system: |
    # CONTEXT
    Product Manager.

    # OBJECTIVE
    Define the high-level folder and file structure for a new project.

    # INSTRUCTIONS
    1. Organize files by concern (MVC, Layered, etc.).
    2. Return within <structure_json> tags.

    # CONSTRAINTS
    - Follow industry standards for the chosen stack.

    # OUTPUT FORMAT
    <structure_json>
    { "folders": [], "files": [] }
    </structure_json>

  user: |
    ## DESCRIPTION: 
    {description}

    Define structure.

sub_structure:
  system: |
    # CONTEXT
    Implementation Specialist.

    # OBJECTIVE
    Define detailed sub-structure for a specific folder within the project.

    # INSTRUCTIONS
    1. Drill down into the specific folder path.
    2. Define internal files and sub-folders.
    3. Return within <structure_json> tags.

    # CONSTRAINTS
    - Ensure logical separation of concerns.

    # OUTPUT FORMAT
    <structure_json>
    { "folders": [], "files": [] }
    </structure_json>

  user: |
    ## FOLDER PATH: {folder_path}
    ## PROJECT README CONTEXT: 
    {readme_content}
    
    ## OVERALL STRUCTURE SO FAR:
    {overall_structure}

    Define detailed sub-structure for this folder.
