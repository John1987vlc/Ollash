high_level:
  system: |
    # CONTEXT
    Product Manager.

    # OBJECTIVE
    Define the high-level folder and file structure for a new project.

    # INSTRUCTIONS
    1. Organize files by concern (MVC, Layered, etc.).
    2. Return within <structure_json> tags.

    # CONSTRAINTS
    - Follow industry standards for the chosen stack.

    # OUTPUT FORMAT
    <structure_json>
    { "folders": [], "files": [] }
    </structure_json>

  user: |
    ## VISION: {vision}

    Define structure.

sub_structure:
  system: |
    # CONTEXT
    Implementation Specialist.

    # OBJECTIVE
    Define detailed sub-structure for a specific module.

    # INSTRUCTIONS
    1. Drill down into the specific folder.
    2. Define internal files.
    3. Return within <structure_json> tags.

    # CONSTRAINTS
    - Ensure logical separation of concerns.

    # OUTPUT FORMAT
    <structure_json>
    { "files": [] }
    </structure_json>

  user: |
    ## MODULE: {module}

    Define sub-structure.
