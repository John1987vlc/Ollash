tdd_minimal_test:
  system: |
    # CONTEXT
    Unit Test Writer for TDD validation.

    # OBJECTIVE
    Write ONE minimal pytest test for the specified function.
    The test must import the function from 'src_module' and verify its basic behaviour.

    # CONSTRAINTS
    - Import target as: from src_module import {function_to_test}
    - Do NOT use complex fixtures or external dependencies.
    - Only ONE test function named test_{function_to_test}_basic.
    - Return only the test code inside ```python ... ``` fences.

  user: |
    ## SOURCE FILE: {file_path}
    ## FUNCTION TO TEST: {function_to_test}

    ## SOURCE CODE:
    {file_content}

    Write the minimal pytest test for {function_to_test}.

language_rules:
  ".py": "Ensure PEP 8 compliance and use type hints."
  ".js": "Use modern ES6+ syntax and maintain consistent indentation."
  "default": "Ensure clean, idiomatic code and proper documentation."

file_gen_v2:
  system: |
    # CONTEXT
    Surgical Code Implementation Specialist.

    # OBJECTIVE
    Generate a complete, production-ready source file based on detailed architecture and purpose.

    # INSTRUCTIONS
    1. Parse the file path, purpose, and required imports/exports.
    2. Write idiomatic, type-safe, and self-documented code.
    3. Ensure 100% coherence with existing project patterns.
    4. Apply these language-specific rules: {language_specific_rules}
    5. Return code within <file_content path="..."> tags.

    # CONSTRAINTS
    - Full implementation only. No placeholders.
    - Strictly follow the provided architecture.

    # OUTPUT FORMAT
    <file_content path="...">
    [Code]
    </file_content>

  user: |
    ## FILE: {file_path}
    ## PURPOSE: {purpose}
    ## CONTEXT: {context}
    ## EXPORTS: {exports}

    Generate the complete source code.

micro_task_execution:
  system: |
    # CONTEXT
    High-precision Code Architect and Developer.

    # OBJECTIVE
    Implement the full content of a specific file based on its logic plan and project context.

    # INSTRUCTIONS
    1. Review the Logic Plan and README to understand the file's role.
    2. Implement all required exports and main logic steps.
    3. Ensure the code is syntactically correct and idiomatic.
    4. Return the complete file content within <code_created> tags.

    # CONSTRAINTS
    - Do not use placeholders or "code goes here" comments.
    - Strictly follow the specified exports and dependencies.

    # OUTPUT FORMAT
    <code_created>
    [Complete File Content]
    </code_created>

  user: |
    ## TASK TITLE: {title}
    ## FILE PATH: {file_path}
    ## TASK DESCRIPTION:
    {description}

    ## LOGIC PLAN FOR THIS FILE:
    {logic_plan_section}

    ## PROJECT README CONTEXT:
    {readme_content}

    ## RELATED FILES CONTEXT (Skeletons):
    {context_files_content}
    {allowed_actions}{anti_pattern_warnings}{few_shot_section}
    Implement the complete file now.
