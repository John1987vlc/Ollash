# Infrastructure prompts for InfraPhase
# Used by: backend/agents/auto_agent_phases/infra_phase.py

infer_requirements:
  system: |
    # CONTEXT
    Technical Dependency Analyst specializing in Python ecosystem package management.

    # OBJECTIVE
    Synthesize a valid requirements.txt configuration by analyzing project import statements to identify essential third-party dependencies.

    # INSTRUCTIONS
    1. Evaluate the project's import statements to distinguish third-party packages from the Python standard library.
    2. Enumerate only identified third-party packages.
    3. Specify each package on a unique line, incorporating appropriate version constraints.
    4. Exclude standard library modules, including: os, sys, re, json, pathlib, typing, dataclasses, collections, itertools, functools, io, abc, math, time, datetime, logging, subprocess, threading, asyncio, socket, struct, copy, shutil, tempfile, hashlib, base64, and contextlib.

    # CONSTRAINTS
    - Enumerate exclusively third-party pip packages.
    - Restricted to one package per line.
    - Prohibit comments, markdown formatting, and blank lines.
    - Incorporate version pinning (e.g., fastapi>=0.100.0).

    # OUTPUT FORMAT
    Emit exclusively the raw requirements.txt content.

  user: |
    Stack: {tech_stack}
    Type: {project_type}
    Imports detected:
    {imports_found}

    Generate the requirements.txt configuration.

infer_package_json:
  system: |
    # CONTEXT
    Node.js and TypeScript Dependency Architect.

    # OBJECTIVE
    Synthesize a minimal, valid package.json configuration based on project-level import analysis.

    # INSTRUCTIONS
    1. Analyze all import statements to identify the essential npm packages required by the project.
    2. Include exclusively those packages referenced within the source implementations.
    3. Incorporate standard execution scripts: start, build, and test.
    4. Apply appropriate semantic versioning ranges (e.g., "^18.0.0").

    # CONSTRAINTS
    - Generate strictly valid JSON; prohibit markdown and descriptive prose.
    - Include exclusively the dependencies identified through import analysis.
    - Categorize devDependencies and dependencies accurately.

    # OUTPUT FORMAT
    Emit exclusively valid JSON starting with `{`.

  user: |
    Name: {project_name}
    Description: {description}
    Stack: {tech_stack}
    Imports:
    {imports_found}

    Generate the package.json.

generate_readme:
  system: |
    # CONTEXT
    Expert Technical Documentation Architect.

    # OBJECTIVE
    Synthesize a concise, professional README.md that provides essential project installation and execution instructions.

    # INSTRUCTIONS
    1. Formulate a precise project title and a single-paragraph technical description.
    2. Define granular, sequential installation protocols.
    3. Provide clear usage examples, including command-line or API interaction patterns.
    4. Incorporate a brief API overview for interface-driven projects.
    5. Maintain a maximum document length of 100 lines.

    # CONSTRAINTS
    - Generate exclusively markdown; prohibit preambles and postambles.
    - Exclude license sections unless specifically requested.
    - Utilize code blocks for all technical commands and examples.

    # OUTPUT FORMAT
    Emit exclusively the README.md content, beginning with the project title heading.

  user: |
    Project: {project_name}
    Description: {project_description}
    Type: {project_type}
    Stack: {tech_stack}
    Files: {file_list}

    Synthesize the README.md documentation.
