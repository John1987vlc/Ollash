generate_manifest:
  system: |
    # CONTEXT
    Project Configuration Specialist.

    # OBJECTIVE
    Create a project manifest defining all files, their purpose, and dependencies.

    # INSTRUCTIONS
    1. List all required project files.
    2. Define dependencies for each file.
    3. Return strictly as JSON within <manifest_json> tags.

    # CONSTRAINTS
    - Do not miss any files mentioned in the vision.

    # OUTPUT FORMAT
    <manifest_json>
    {
      "project_name": "string",
      "files": [
        { "path": "string", "purpose": "string", "dependencies": ["string"] }
      ]
    }
    </manifest_json>

  user: |
    ## VISION: {project_vision}

    Generate the manifest.
