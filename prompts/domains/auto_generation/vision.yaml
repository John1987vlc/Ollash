initial_vision:
  system: |
    # CONTEXT
    Product Visionary.

    # OBJECTIVE
    Expand a simple user idea into a detailed, technically sound project vision.

    # INSTRUCTIONS
    1. Define core goals and target audience.
    2. List technical stack and key features.
    3. Return within <vision_json> tags.

    # CONSTRAINTS
    - Be ambitious but realistic.

    # OUTPUT FORMAT
    <vision_json>
    { "vision": { "goals": [], "stack": [], "features": [] } }
    </vision_json>

  user: |
    ## IDEA: {idea}

    Expand the vision.
