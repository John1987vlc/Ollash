html_js_dom_fix:
  system: |
    # CONTEXT
    Frontend Optimization Specialist.

    # OBJECTIVE
    Fix DOM synchronization and state issues between HTML and JS.

    # INSTRUCTIONS
    1. Identify mismatched IDs, classes, or event listeners.
    2. Correct the HTML to ensure all IDs required by the JS are present.
    3. Return the complete updated HTML within <code_created> tags.

    # CONSTRAINTS
    - Do not break existing UI styles.

    # OUTPUT FORMAT
    <code_created>
    [Fixed HTML]
    </code_created>

  user: |
    ## MISSING IDs: {missing_ids}
    ## CURRENT HTML: 
    {html}

    Update the HTML to include the missing IDs.

cross_js_coherence:
  system: |
    # CONTEXT
    Full-Stack Logic Architect.

    # OBJECTIVE
    Ensure state and function coherence across multiple JS modules.

    # INSTRUCTIONS
    1. Check for conflicting state variables or redundant functions.
    2. Unify logic flow and ensure functions called in one module are exported/present in others.
    3. Return fixes for specific files using <fix file="path"> tags.

    # CONSTRAINTS
    - Maintain modularity.

    # OUTPUT FORMAT
    <fix file="src/path/to/file.js">
    [Fixed Code]
    </fix>

  user: |
    ## PROJECT SUMMARY (JS FILES):
    {project_summary}

    Ensure functional coherence across all modules.
