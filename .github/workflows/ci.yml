name: Ollash CI/CD

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        playwright install chromium
        
    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check backend/ frontend/ tests/ --select=E9,F63,F7,F82 --ignore=E501
        
    - name: Run Unit Tests
      run: |
        pytest tests/unit/
        
    - name: Run E2E Tests (Headless)
      run: |
        # Start the Flask app in background is handled by the fixture in conftest.py
        # But we need to ensure port availability.
        # Running pytest will handle the server start/stop.
        pytest tests/e2e/
      env:
        FLASK_ENV: testing
